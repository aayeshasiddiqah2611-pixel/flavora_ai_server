services:
  - type: static
    name: flavora-client
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://flavora-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
